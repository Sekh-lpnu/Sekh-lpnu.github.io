<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до аккаунту</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700|Roboto:300&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header__inner container">
        <a href="index.html" class="nav__link__logo">УВС</a> <!-- Логотип на головну -->
        <nav class="nav">
            <a href="initiatives.html" class="nav__link">Доступні ініціативи</a>
            <a href="my-initiatives.html" class="nav__link">Мої ініціативи</a>
            <a href="about.html" class="nav__link">Про нас</a>
            <a href="login.html" class="nav__link">Увійти</a>
        </nav>
    </div>
</header>

<!-- Основний контент -->
<section id="main-content-log" class="main-content-log">
    <div class="container">
        <h1>Вхід до аккаунту</h1>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Електронна пошта</label>
                <input type="email" id="email" name="email" required placeholder="Введіть вашу електронну пошту">
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required placeholder="Введіть ваш пароль">
            </div>
            
            <button type="submit" class="btn">Увійти</button>
        </form>
        
        <p>Ще не маєте акаунту? <a href="register.html">Зареєструйтесь</a></p>
    </div>
</section>

<footer class="footer__inner">
    <div class="container">
        <p class="footer__text">© 2017 - 2025 Українська Волонтерська Служба</p>
        <p class="footer__text">Зв'яжіться з нами: example@email.com | +380 123 456 789</p>
        <p class="footer__text">Слідкуйте за нами в соцмережах: Facebook | Instagram | Twitter</p>
    </div>
</footer>

<script>
    // Обробка форми входу
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Перевірка чи існує користувач в localStorage
        const user = JSON.parse(localStorage.getItem('user'));
        
        if (user && user.email === email && user.password === password) {
            // Якщо дані вірні, зберігаємо статус входу
            localStorage.setItem('loggedIn', JSON.stringify(true));
            window.location.href = "my-initiatives.html"; // Перехід на сторінку ініціатив користувача
        } else {
            alert('Невірний email або пароль');
        }
    });
</script>

</body>
</html>
