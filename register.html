<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700|Roboto:300&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header__inner container">
        <a href="index.html" class="nav__link__logo">УВС</a> <!-- Логотип на головну -->
        <nav class="nav">
            <a href="initiatives.html" class="nav__link">Доступні ініціативи</a>
            <a href="my-initiatives.html" class="nav__link">Мої ініціативи</a>
            <a href="about.html" class="nav__link">Про нас</a>
            <a href="login.html" class="nav__link">Увійти</a>
        </nav>
    </div>
</header>

<!-- Основний контент -->
<section id="main-content-reg" class="main-content-reg">
    <div class="container">
        <h1>Реєстрація</h1>
        
        <form id="register-form">
            <div class="form-group">
                <label for="name">Ім'я</label>
                <input type="text" id="name" name="name" required placeholder="Введіть ваше ім'я">
            </div>
            
            <div class="form-group">
                <label for="email">Електронна пошта</label>
                <input type="email" id="email" name="email" required placeholder="Введіть вашу електронну пошту">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required placeholder="Введіть ваш пароль">
            </div>

            <div class="form-group">
                <label for="confirm-password">Підтвердження пароля</label>
                <input type="password" id="confirm-password" name="confirm-password" required placeholder="Підтвердіть ваш пароль">
            </div>
            
            <button type="submit" class="btn">Зареєструватися</button>
        </form>
        
        <p>Вже маєте акаунт? <a href="login.html">Увійти</a></p>
    </div>
</section>

<footer class="footer__inner">
    <div class="container">
        <p class="footer__text">© 2017 - 2025 Українська Волонтерська Служба</p>
        <p class="footer__text">Зв'яжіться з нами: example@email.com | +380 123 456 789</p>
        <p class="footer__text">Слідкуйте за нами в соцмережах: Facebook | Instagram | Twitter</p>
    </div>
</footer>

<script>
    // Обробка форми реєстрації
    document.getElementById('register-form').addEventListener('submit', function (e) {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        // Перевірка чи паролі співпадають
        if (password !== confirmPassword) {
            alert('Паролі не співпадають');
            return;
        }

        // Збереження користувача в localStorage
        const user = {
            name: name,
            email: email,
            password: password
        };

        localStorage.setItem('user', JSON.stringify(user));
        alert('Реєстрація успішна!');
        window.location.href = "login.html"; // Перехід на сторінку входу
    });
</script>

</body>
</html>
